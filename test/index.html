<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FotonMag</title>
    <style>
    body { 
        margin: 0; 
        padding: 0; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        height: 100vh; 
        background-color: #FF1493; /* Тот самый насыщенный розовый с вашей картинки */
        color: white; 
        font-family: 'Arial Black', 'Helvetica Inserat', 'Arial Bold', sans-serif; /* Максимально жирный шрифт */
        text-align: center; 
    }
    .container { padding: 20px; }
    h1 { 
        font-size: 4.5rem; /* Очень большие буквы */
        margin: 0 0 15px 0; 
        text-transform: uppercase; /* Все буквы большие */
        letter-spacing: 1px; /* Чуть плотнее, чтобы выглядело мощнее */
        color: #FFFFFF; /* Чисто белый текст */
        line-height: 1;
        -webkit-text-stroke: 1px #FFFFFF; /* Дополнительная жирность для заголовка */
    }
    p { 
        font-size: 1.3rem; 
        margin-bottom: 35px; 
        color: #FFFFFF;
        opacity: 0.95; /* Почти непрозрачный, чтобы хорошо читался */
        font-family: sans-serif;
        font-weight: normal;
    }
    .btn { 
        display: inline-block; 
        padding: 16px 38px; 
        background-color: #FFFFFF; 
        color: #FF1493; /* Текст кнопки под цвет фона */
        text-decoration: none; 
        border-radius: 35px; 
        font-weight: bold; 
        font-size: 1.1rem;
        transition: 0.3s; 
        font-family: sans-serif;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1); /* Легкая тень для кнопки */
    }
    .btn:hover { 
        transform: scale(1.05) translateY(-2px); 
        box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }
    .logo { 
        font-size: 3.5rem; 
        margin-bottom: 15px; 
        display: block;
    }
</style>
</head>
<body>
    <div class="container">
        <div class="logo">📸</div>
        <h1>FOTON.MAG</h1>
        <p>Создаем рамки, которые умеют говорить и оживлять моменты.</p>
        <a href="https://www.instagram.com/foton.mag/" target="_blank" class="btn">Заказать в Instagram</a>
    </div>
</body>
</html>
