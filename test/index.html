<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FotonMag</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23FF1493' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M23 19C23 20.1046 22.1046 21 21 21H3C1.89543 21 1 20.1046 1 19V8C1 6.89543 1.89543 6 3 6H7L9 3H15L17 6H21C22.1046 6 23 6.89543 23 8V19Z'/><circle cx='12' cy='13' r='4'/></svg>">
    
    <style>
    body { 
        margin: 0; 
        padding: 0; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        height: 100vh; 
        background-color: #FF1493; /* Тот самый насыщенный розовый с вашей картинки */
        color: white; 
        font-family: 'Arial Black', 'Helvetica Inserat', 'Arial Bold', sans-serif; /* Максимально жирный шрифт */
        text-align: center; 
    }
    .container { padding: 20px; }
    h1 { 
        font-size: 4.5rem; /* Очень большие буквы */
        margin: 0 0 15px 0; 
        text-transform: uppercase; /* Все буквы большие */
        letter-spacing: 1px; /* Чуть плотнее, чтобы выглядело мощнее */
        color: #FFFFFF; /* Чисто белый текст */
        line-height: 1;
        -webkit-text-stroke: 1px #FFFFFF; /* Дополнительная жирность для заголовка */
    }
    p { 
        font-size: 1.3rem; 
        margin-bottom: 35px; 
        color: #FFFFFF;
        opacity: 0.95; /* Почти непрозрачный, чтобы хорошо читался */
        font-family: sans-serif;
        font-weight: normal;
    }
    .btn { 
        display: inline-block; 
        padding: 16px 38px; 
        background-color: #FFFFFF; 
        color: #FF1493; /* Текст кнопки под цвет фона */
        text-decoration: none; 
        border-radius: 35px; 
        font-weight: bold; 
        font-size: 1.1rem;
        transition: 0.3s; 
        font-family: sans-serif;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1); /* Легкая тень для кнопки */
    }
    .btn:hover { 
        transform: scale(1.05) translateY(-2px); 
        box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }
    .logo { 
        font-size: 3.5rem; 
        margin-bottom: 15px; 
        display: block;
    }
</style>
</head>
<body>
   <div class="container">
    <div class="logo">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M23 19C23 20.1046 22.1046 21 21 21H3C1.89543 21 1 20.1046 1 19V8C1 6.89543 1.89543 6 3 6H7L9 3H15L17 6H21C22.1046 6 23 6.89543 23 8V19Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="13" r="4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>
        <h1>FOTON.MAG</h1>
        <p>Создаем постеры, которые умеют говорить вашими голосами</p>
        <a href="https://www.instagram.com/foton.mag/" target="_blank" class="btn">Заказать в Instagram</a>
    </div>
</body>
</html>
