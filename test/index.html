<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foton.Mag</title>
    <style>
    body { 
        margin: 0; 
        padding: 0; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        height: 100vh; 
        background: #FFD1DC; /* Нежно-розовый цвет */
        color: white; 
        font-family: 'Arial Black', sans-serif; /* Более жирный шрифт для заголовка */
        text-align: center; 
    }
    .container { padding: 20px; }
    h1 { 
        font-size: 3.5rem; /* Увеличенный размер букв */
        margin-bottom: 10px; 
        text-transform: uppercase; /* Все буквы большие */
        letter-spacing: 2px; /* Небольшой отступ между буквами */
        color: #FFFFFF; /* Чисто белый цвет */
    }
    p { 
        font-size: 1.2rem; 
        margin-bottom: 30px; 
        color: #FFFFFF;
        opacity: 0.9;
        font-family: sans-serif;
    }
    .btn { 
        display: inline-block; 
        padding: 15px 35px; 
        background: #FFFFFF; 
        color: #FFD1DC; /* Текст кнопки под цвет фона */
        text-decoration: none; 
        border-radius: 30px; 
        font-weight: bold; 
        transition: 0.3s; 
        font-family: sans-serif;
    }
    .btn:hover { 
        transform: scale(1.05); 
        background: #fdfdfd; 
    }
    .logo { 
        font-size: 3rem; 
        margin-bottom: 20px; 
    }
</style>
</head>
<body>
    <div class="container">
        <div class="logo">📸</div>
        <h1>FOTON.MAG</h1>
        <p>Создаем рамки, которые умеют говорить и оживлять моменты.</p>
        <a href="https://www.instagram.com/foton.mag/" target="_blank" class="btn">Заказать в Instagram</a>
    </div>
</body>
</html>
