<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foton Mag — Звучат моменты</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #111; color: white; font-family: sans-serif; text-align: center; }
        .container { padding: 20px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(45deg, #ff0055, #ffdd00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 1.1rem; opacity: 0.8; margin-bottom: 30px; }
        .btn { display: inline-block; padding: 12px 30px; background: #ff0055; color: white; text-decoration: none; border-radius: 25px; font-weight: bold; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); background: #ff2277; }
        .logo { width: 100px; height: 100px; background: #333; border-radius: 50%; margin: 0 auto 20px; display: flex; justify-content: center; align-items: center; font-size: 2rem; border: 2px solid #ff0055; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📸</div>
        <h1>FOTON MAG</h1>
        <p>Создаем рамки, которые умеют говорить и оживлять моменты.</p>
        <a href="https://www.instagram.com/foton.mag/" target="_blank" class="btn">Заказать в Instagram</a>
    </div>
</body>
</html>
