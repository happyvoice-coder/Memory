<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FotonMag</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23FF1493' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M23 19C23 20.1046 22.1046 21 21 21H3C1.89543 21 1 20.1046 1 19V8C1 6.89543 1.89543 6 3 6H7L9 3H15L17 6H21C22.1046 6 23 6.89543 23 8V19Z'/><circle cx='12' cy='13' r='4'/></svg>">
    
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        width: 100%;
        height: 100%;
        overflow-x: hidden;
    }

    body { 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        min-height: 100vh; 
        background-color: #FF1493; 
        color: white; 
        font-family: 'Arial Black', 'Helvetica Inserat', 'Arial Bold', sans-serif; 
        text-align: center;
    }

    .container { 
        padding: 20px; 
        width: 100%;
        max-width: 900px;
        box-sizing: border-box;
    }

    .logo { 
        margin-bottom: 15px; 
        display: flex;
        justify-content: center;
    }

    .logo svg {
        width: 80px;
        height: 80px;
    }

    h1 { 
        font-size: clamp(2rem, 8vw, 4.5rem);
        margin: 0 0 15px 0; 
        text-transform: uppercase; 
        letter-spacing: 1px; 
        color: #FFFFFF; 
        line-height: 1.2;
        word-break: break-word;
    }

    p { 
        font-size: clamp(1rem, 4vw, 1.3rem);
        margin-bottom: 35px; 
        color: #FFFFFF;
        opacity: 0.95; 
        font-family: sans-serif;
        font-weight: normal;
        line-height: 1.4;
    }

    .btn { 
        display: inline-block; 
        padding: clamp(12px, 3vw, 16px) clamp(24px, 6vw, 38px);
        background-color: #FFFFFF; 
        color: #FF1493; 
        text-decoration: none; 
        border-radius: 35px; 
        font-weight: bold; 
        font-size: clamp(0.95rem, 3vw, 1.1rem);
        transition: 0.3s; 
        font-family: sans-serif;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        white-space: nowrap;
        border: none;
        cursor: pointer;
    }

    .btn:hover { 
        transform: scale(1.05) translateY(-2px); 
        box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }

    .btn:active {
        transform: scale(0.98);
    }

    input, button, a {
        font-size: 16px;
    }
    </style>
</head>
<body>
   <div class="container">
    <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M23 19C23 20.1046 22.1046 21 21 21H3C1.89543 21 1 20.1046 1 19V8C1 6.89543 1.89543 6 3 6H7L9 3H15L17 6H21C22.1046 6 23 6.89543 23 8V19Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="13" r="4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>
    <h1>FOTON.MAG</h1>
    <p>Создаем постеры, которые умеют говорить вашими голосами</p>
    <a href="https://www.instagram.com/foton.mag/" target="_blank" class="btn">Заказать в Instagram</a>
   </div>
</body>
</html>
